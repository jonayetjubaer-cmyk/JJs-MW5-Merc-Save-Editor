name: Build and Release

# Push a version tag (e.g. `git tag v1.6.0 && git push --tags`) to build the
# Nuitka EXE, attach it to a GitHub Release, and upload it to Nexus Mods.
# You can also run it manually (workflow_dispatch) to test the build only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    env:
      # Set these in GitHub → repo Settings:
      #   Secrets → Actions:   NEXUSMODS_API_KEY  (your Nexus personal API key)
      #   Variables → Actions: NEXUS_FILE_GROUP_ID (mod page → Files tab → "API Info")
      # If they're not set, the Nexus upload step is skipped (GitHub Release still runs).
      NEXUS_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
      NEXUS_GID: ${{ vars.NEXUS_FILE_GROUP_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # stable target for Nuitka

      - name: Install build dependencies
        run: pip install nuitka

      - name: Work out version + zip name
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if (-not $tag.StartsWith('v')) { $ver = '0.0.0-dev' }
          "version=$ver"                                   >> $env:GITHUB_OUTPUT
          "zip=JJs-MW5-Merc-Save-Editor-$tag.zip"          >> $env:GITHUB_OUTPUT

      - name: Build with Nuitka (native binary)
        shell: pwsh
        run: |
          python -m nuitka --standalone --enable-plugin=tk-inter `
            --windows-console-mode=disable `
            --windows-icon-from-ico=editor/app_icon.ico `
            --include-data-files=editor/app_icon.ico=app_icon.ico `
            --include-data-files=editor/app_icon.png=app_icon.png `
            --assume-yes-for-downloads `
            --output-dir=build_out --output-filename=MW5SaveEditor.exe `
            editor/gui.py

      - name: Package folder into a zip
        shell: pwsh
        run: |
          Rename-Item build_out/gui.dist MW5SaveEditor
          Compress-Archive -Path build_out/MW5SaveEditor -DestinationPath "${{ steps.ver.outputs.zip }}"

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = @()
          $inSection = $false
          foreach ($line in (Get-Content CHANGELOG.md)) {
            if ($line -match '^##\s+') {
              if ($inSection) { break }   # reached the next version's heading
              if ($line -match ('^##\s+' + [regex]::Escape($tag) + '\b')) {
                $inSection = $true
                continue                  # skip the heading line itself
              }
            }
            if ($inSection) { $out += $line }
          }
          $body = ($out -join "`n").Trim()
          if (-not $body) { $body = "Release $tag" }
          # pwsh utf8 is BOM-less; write the notes for the release step to read
          Set-Content -Path release_notes.md -Value $body -Encoding utf8
          Write-Host "----- release_notes.md -----"
          Write-Host $body

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.zip }}
          body_path: release_notes.md

      - name: Upload to Nexus Mods
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.NEXUS_KEY != '' && env.NEXUS_GID != '' }}
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ env.NEXUS_KEY }}
          file_group_id: ${{ env.NEXUS_GID }}
          filename: ${{ steps.ver.outputs.zip }}
          version: ${{ steps.ver.outputs.version }}
          display_name: JJ's MW5 Merc Save Editor ${{ github.ref_name }}
          archive_existing_file: true
