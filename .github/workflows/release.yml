name: Build and Release

# Push a version tag (e.g. `git tag v1.6.0 && git push --tags`) to build the
# Nuitka EXE, attach it to a GitHub Release, and upload it to Nexus Mods.
# You can also run it manually (workflow_dispatch) to test the build only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    env:
      # Set these in GitHub → repo Settings:
      #   Secrets → Actions:   NEXUSMODS_API_KEY  (your Nexus personal API key)
      #   Variables → Actions: NEXUS_FILE_GROUP_ID (mod page → Files tab → "API Info")
      # If they're not set, the Nexus upload step is skipped (GitHub Release still runs).
      NEXUS_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
      NEXUS_GID: ${{ vars.NEXUS_FILE_GROUP_ID }}
      # Code signing via SignPath Foundation (free for OSS). Once your project is
      # approved and the SignPath GitHub App is installed on this repo, set:
      #   Secret   → Actions: SIGNPATH_API_TOKEN          (submitter API token)
      #   Variables → Actions: SIGNPATH_ORGANIZATION_ID
      #                        SIGNPATH_PROJECT_SLUG
      #                        SIGNPATH_SIGNING_POLICY_SLUG   (e.g. release-signing)
      # Until SIGNPATH_PROJECT_SLUG is set, the signing steps below are skipped and
      # the build ships unsigned exactly as before.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # stable target for Nuitka

      - name: Install build dependencies
        run: pip install nuitka

      - name: Work out version + zip name
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if (-not $tag.StartsWith('v')) { $ver = '0.0.0-dev' }
          # Numeric-only form for the Windows VERSIONINFO resource: Nuitka's
          # --file-version wants digits/dots, so strip any suffix like -dev.
          $filever = ($ver -replace '[^0-9.]', '').Trim('.')
          if (-not $filever) { $filever = '0.0.0' }
          "version=$ver"                                   >> $env:GITHUB_OUTPUT
          "filever=$filever"                               >> $env:GITHUB_OUTPUT
          "zip=JJs-MW5-Merc-Save-Editor-$tag.zip"          >> $env:GITHUB_OUTPUT

      - name: Build with Nuitka (native binary)
        shell: pwsh
        run: |
          python -m nuitka --standalone --enable-plugin=tk-inter `
            --windows-console-mode=disable `
            --windows-icon-from-ico=editor/app_icon.ico `
            --include-data-files=editor/app_icon.ico=app_icon.ico `
            --include-data-files=editor/app_icon.png=app_icon.png `
            --include-data-files=editor/stock_templates.json.gz=stock_templates.json.gz `
            --company-name="JJ (jonayetjubaer-cmyk)" `
            --product-name="JJ's MW5 Merc Save Editor" `
            --file-version=${{ steps.ver.outputs.filever }} `
            --product-version=${{ steps.ver.outputs.filever }} `
            --file-description="JJ's MechWarrior 5 Mercenaries Save Editor" `
            --copyright="(c) 2026 JJ (jonayetjubaer-cmyk). MIT License." `
            --assume-yes-for-downloads `
            --output-dir=build_out --output-filename=JJsaveEditor.exe `
            editor/gui.py

      - name: Name the build folder
        shell: pwsh
        run: Rename-Item build_out/gui.dist JJsaveEditor

      # --- Code signing (SignPath Foundation). Skipped until SIGNPATH_PROJECT_SLUG
      #     is set, so unsigned builds keep working unchanged in the meantime. ---
      - name: Upload unsigned exe (for signing)
        id: upload_unsigned
        if: ${{ vars.SIGNPATH_PROJECT_SLUG != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-jjsaveeditor
          path: build_out/JJsaveEditor/JJsaveEditor.exe
          if-no-files-found: error

      - name: Submit signing request to SignPath
        id: signpath
        if: ${{ vars.SIGNPATH_PROJECT_SLUG != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Swap in the signed exe
        if: ${{ vars.SIGNPATH_PROJECT_SLUG != '' }}
        shell: pwsh
        run: |
          $signed = Get-ChildItem signed -Recurse -Filter JJsaveEditor.exe | Select-Object -First 1
          if (-not $signed) { throw "SignPath returned no signed JJsaveEditor.exe" }
          Copy-Item $signed.FullName build_out/JJsaveEditor/JJsaveEditor.exe -Force
          Write-Host "Replaced the build exe with the SignPath-signed copy."

      - name: Package folder into a zip
        shell: pwsh
        run: Compress-Archive -Path build_out/JJsaveEditor -DestinationPath "${{ steps.ver.outputs.zip }}"

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = @()
          $inSection = $false
          foreach ($line in (Get-Content CHANGELOG.md)) {
            if ($line -match '^##\s+') {
              if ($inSection) { break }   # reached the next version's heading
              if ($line -match ('^##\s+' + [regex]::Escape($tag) + '\b')) {
                $inSection = $true
                continue                  # skip the heading line itself
              }
            }
            if ($inSection) { $out += $line }
          }
          $body = ($out -join "`n").Trim()
          if (-not $body) { $body = "Release $tag" }
          # pwsh utf8 is BOM-less; write the notes for the release step to read
          Set-Content -Path release_notes.md -Value $body -Encoding utf8
          Write-Host "----- release_notes.md -----"
          Write-Host $body

      - name: Append SHA-256 hashes to release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $zip = "${{ steps.ver.outputs.zip }}"
          $exe = "build_out/JJsaveEditor/JJsaveEditor.exe"
          $zipHash = (Get-FileHash $zip -Algorithm SHA256).Hash
          $exeHash = (Get-FileHash $exe -Algorithm SHA256).Hash
          $lines = @(
            ""
            "---"
            ""
            "**SHA-256** (a genuine download matches these):"
            ('- `' + [System.IO.Path]::GetFileName($zip) + '`: `' + $zipHash + '`')
            ('- `JJsaveEditor.exe`: `' + $exeHash + '`')
          )
          Add-Content -Path release_notes.md -Value $lines -Encoding utf8
          Write-Host ($lines -join "`n")

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.zip }}
          body_path: release_notes.md

      - name: Upload to Nexus Mods
        # Kill-switch: set repo variable DISABLE_NEXUS=true to build + publish the
        # GitHub release WITHOUT uploading to Nexus (e.g. to vet a new build for AV
        # false positives before it goes public on Nexus). Unset/false = normal.
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.NEXUS_KEY != '' && env.NEXUS_GID != '' && vars.DISABLE_NEXUS != 'true' }}
        uses: Nexus-Mods/upload-action@v1.0.0-beta.7
        with:
          api_key: ${{ env.NEXUS_KEY }}
          file_group_id: ${{ env.NEXUS_GID }}
          filename: ${{ steps.ver.outputs.zip }}
          version: ${{ steps.ver.outputs.version }}
          display_name: JJ's MW5 Merc Save Editor ${{ github.ref_name }}
          archive_existing_file: true
